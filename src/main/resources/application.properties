spring.application.name=expensepilot-ai

spring.datasource.url=jdbc:postgresql://localhost:5432/expensepilot_db
spring.datasource.username=expensepilot
spring.datasource.password=expensepilot@123

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

spring.flyway.locations=classpath:db/migration

spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.data-source-properties.options=-c TimeZone=UTC
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'